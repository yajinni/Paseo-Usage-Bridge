name: Publish desktop release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/release-trigger

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            apple_signing_identity: ""
          - os: macos-15
            args: ""
            apple_signing_identity: "-"
          - os: macos-15-intel
            args: ""
            apple_signing_identity: "-"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm install
      - name: Prepare and verify updater signing key
        shell: bash
        env:
          UPDATER_PRIVATE_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          raw_key = os.environ.get("UPDATER_PRIVATE_KEY_SECRET", "")
          normalized_key = "".join(raw_key.split())
          expected_sha256 = "943b0844c4516b5c70b00fdc6b9607024bb493d83f46a821f11b115f654f5c8b"

          if not normalized_key:
              raise SystemExit("Repository secret TAURI_SIGNING_PRIVATE_KEY is required.")

          actual_sha256 = hashlib.sha256(normalized_key.encode("utf-8")).hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(
                  "TAURI_SIGNING_PRIVATE_KEY does not match the backed-up Paseo updater key. "
                  "Re-save the exact contents of Paseo-Usage-Bridge-updater-private-key.txt."
              )

          key_path = Path(os.environ["RUNNER_TEMP"]) / "paseo-usage-bridge-updater.key"
          key_path.write_text(normalized_key, encoding="utf-8", newline="")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as github_env:
              github_env.write(f"TAURI_SIGNING_PRIVATE_KEY={key_path}\n")

          print("Updater signing key matches the expected passwordless key fingerprint.")
          PY
      - name: Test updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf 'Paseo Usage Bridge updater signing preflight\n' > "$RUNNER_TEMP/updater-signing-preflight.txt"
          npx tauri signer sign \
            --private-key-path "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$RUNNER_TEMP/updater-signing-preflight.txt"
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Paseo Usage Bridge v__VERSION__
          releaseBody: |
            Download the Windows installer or the macOS build for your processor from the assets below.

            This release includes signed updater packages and `latest.json` for automatic in-app updates.

            These builds are not yet backed by paid platform code-signing certificates. Windows and macOS may display an unverified-publisher warning. The macOS builds use an ad-hoc signature so Apple Silicon downloads are launchable after approval in Privacy & Security.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}