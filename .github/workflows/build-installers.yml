name: Publish desktop release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/release-trigger

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            apple_signing_identity: ""
          - os: macos-15
            args: ""
            apple_signing_identity: "-"
          - os: macos-15-intel
            args: ""
            apple_signing_identity: "-"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm install
      - name: Normalize and verify updater signing key
        shell: python
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          import base64
          import os
          import sys

          raw_key = os.environ.get("RAW_TAURI_SIGNING_PRIVATE_KEY", "")
          normalized_key = "".join(raw_key.lstrip("\ufeff").split())

          if not normalized_key:
              sys.exit("Repository secret TAURI_SIGNING_PRIVATE_KEY is required.")

          try:
              decoded = base64.b64decode(normalized_key, validate=True).decode("utf-8")
          except Exception as error:
              sys.exit(f"TAURI_SIGNING_PRIVATE_KEY is not a valid Tauri Base64 private key: {error}")

          if "secret key" not in decoded.lower():
              sys.exit("TAURI_SIGNING_PRIVATE_KEY does not contain a Tauri updater private key.")

          print(f"::add-mask::{normalized_key}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"TAURI_SIGNING_PRIVATE_KEY={normalized_key}\n")
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: Paseo Usage Bridge v__VERSION__
          releaseBody: |
            ## Which download should I use?

            ### Windows

            **Recommended for most people: download the file ending in `-setup.exe`.**

            - **`-setup.exe` — recommended:** the normal Windows installer. It installs for your Windows account, usually does not require administrator access, and is the installer used by automatic in-app updates.
            - **`.msi` — administrators and managed computers:** intended for enterprise deployment, system administrators, Group Policy, Intune, or machine-wide installation. It commonly requires administrator access.

            Use one Windows installer type consistently. Installing both the `.exe` and `.msi` can create separate installation contexts.

            ### macOS

            - **Apple Silicon:** choose the macOS download marked `aarch64` or `arm64` for M1, M2, M3, M4, and newer Apple chips.
            - **Intel Mac:** choose the macOS download marked `x64` or `x86_64`.

            ### Files you normally should not download manually

            Files ending in `.sig`, `.tar.gz`, and `latest.json` support automatic updates. They are not the normal installers.

            ## Security warning

            These builds are not yet backed by paid platform code-signing certificates. Windows and macOS may display an unverified-publisher warning. The macOS builds use an ad-hoc signature, so you may need to approve the app in **System Settings → Privacy & Security** after downloading it.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
