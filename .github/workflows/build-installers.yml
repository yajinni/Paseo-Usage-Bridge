name: Publish desktop release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            apple_signing_identity: ""
          - os: macos-15
            args: ""
            apple_signing_identity: "-"
          - os: macos-15-intel
            args: ""
            apple_signing_identity: "-"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm install
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
        with:
          tagName: v__VERSION__
          releaseName: Paseo Usage Bridge v__VERSION__
          releaseBody: |
            Download the Windows installer or the macOS build for your processor from the assets below.

            These builds are not yet backed by paid platform signing certificates. Windows and macOS may display an unverified-publisher warning. The macOS builds use an ad-hoc signature so Apple Silicon downloads are launchable after approval in Privacy & Security.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
