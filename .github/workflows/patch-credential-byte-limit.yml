name: Patch credential byte limit

on:
  push:
    branches:
      - ai/fix-windows-credential-byte-limit
    paths:
      - .github/workflows/patch-credential-byte-limit.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai/fix-windows-credential-byte-limit
      - name: Apply focused patch
        shell: python
        run: |
          from pathlib import Path

          store_path = Path("src-tauri/src/store.rs")
          store = store_path.read_text(encoding="utf-8")
          old_constant = "const CREDENTIAL_CHUNK_UTF16_UNITS: usize = 1800;"
          new_constants = "const WINDOWS_CREDENTIAL_BLOB_LIMIT_BYTES: usize = 2560;\nconst CREDENTIAL_CHUNK_UTF16_UNITS: usize = 1200;"
          if old_constant not in store:
              raise SystemExit("Expected credential chunk constant was not found")
          store = store.replace(old_constant, new_constants, 1)

          old_assertion = "chunk.encode_utf16().count() <= CREDENTIAL_CHUNK_UTF16_UNITS"
          new_assertion = "chunk.encode_utf16().count() * 2 <= WINDOWS_CREDENTIAL_BLOB_LIMIT_BYTES"
          assertion_count = store.count(old_assertion)
          if assertion_count != 2:
              raise SystemExit(f"Expected two UTF-16 chunk assertions, found {assertion_count}")
          store = store.replace(old_assertion, new_assertion)

          old_payload = 'let payload = format!("{}{}", "x".repeat(1799), "😀".repeat(5));'
          new_payload = 'let payload = format!(\n            "{}{}",\n            "x".repeat(CREDENTIAL_CHUNK_UTF16_UNITS - 1),\n            "😀".repeat(5)\n        );'
          if old_payload not in store:
              raise SystemExit("Expected UTF-16 boundary test payload was not found")
          store = store.replace(old_payload, new_payload, 1)
          store_path.write_text(store, encoding="utf-8")

          replacements = {
              Path("package.json"): ('"version": "0.2.3"', '"version": "0.2.4"'),
              Path("src-tauri/Cargo.toml"): ('version = "0.2.3"', 'version = "0.2.4"'),
              Path("src-tauri/tauri.conf.json"): ('"version": "0.2.3"', '"version": "0.2.4"'),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected version text missing from {path}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          Path(".github/release-trigger").write_text(
              "Release build requested on 2026-07-14 for Paseo Usage Bridge v0.2.4 with the corrected Windows credential byte limit.\n",
              encoding="utf-8",
          )
          Path(".github/workflows/patch-credential-byte-limit.yml").unlink()
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src/store.rs package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json .github/release-trigger .github/workflows/patch-credential-byte-limit.yml
          git commit -m "fix: respect Windows credential byte limit"
          git push origin HEAD:ai/fix-windows-credential-byte-limit
